name: Build and Test

on:
  workflow_call:
    inputs:
      solution_file:
        required: true
        type: string
      configuration:
        required: false
        type: string
        default: Release
      extra_args:
        required: false
        type: string
        default: ""
    secrets:
      gitops_pat:
        required: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      NUGET_PACKAGES: ${{ github.workspace }}/.ci-nuget/packages
    steps:
      - name: Checkout service
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: service
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x

      - name: Restore NuGet cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-search-nuget-${{ hashFiles('service/**/*.csproj', 'service/Directory.Build.props', 'service/nuget.config') }}
          restore-keys: |
            ${{ runner.os }}-search-nuget-

      - name: Restore exact package graph
        run: dotnet restore ${{ inputs.solution_file }} ${{ inputs.extra_args }}
        working-directory: service
        env:
          NUGET_USERNAME: ${{ github.actor }}
          NUGET_PASSWORD: ${{ secrets.gitops_pat }}

      - name: Record resolved package graph
        run: dotnet list ${{ inputs.solution_file }} package --include-transitive --no-restore
        working-directory: service

      - name: Build
        run: dotnet build ${{ inputs.solution_file }} --no-restore --configuration ${{ inputs.configuration }} ${{ inputs.extra_args }}
        working-directory: service

      - name: Test
        run: dotnet test ${{ inputs.solution_file }} --no-build --no-restore --configuration ${{ inputs.configuration }} --verbosity normal ${{ inputs.extra_args }}
        working-directory: service

      - name: Audit resolved NuGet graph
        shell: pwsh
        run: ./.github/scripts/Assert-NoVulnerablePackages.ps1 -SolutionFile "${{ inputs.solution_file }}"
        working-directory: service
        env:
          NUGET_USERNAME: ${{ github.actor }}
          NUGET_PASSWORD: ${{ secrets.gitops_pat }}
