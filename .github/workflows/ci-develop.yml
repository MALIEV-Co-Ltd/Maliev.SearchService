name: CI - Develop

on:
  push:
    branches: [develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/_build-and-test.yml
    with:
      solution_file: Maliev.SearchService.slnx
      extra_args: -p:GITHUB_ACTIONS=true -p:ServiceDefaultsVersion=1.0.89-alpha -p:MessagingContractsVersion=1.0.94-alpha
    secrets:
      gitops_pat: ${{ secrets.GITOPS_PAT }}

  publish-image:
    name: Publish immutable development image
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: development
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      IMAGE_NAME: asia-southeast1-docker.pkg.dev/maliev-website/maliev-website-artifact-dev/maliev-search-service
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Derive immutable version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          echo "short_sha=${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud with WIF
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: maliev-website
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: maliev-website

      - name: Configure Artifact Registry authentication
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Maliev.SearchService.Api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:dev-${{ steps.version.outputs.short_sha }}
          build-args: |
            SERVICE_DEFAULTS_VERSION=1.0.89-alpha
            MESSAGING_CONTRACTS_VERSION=1.0.94-alpha
          secrets: |
            nuget_username=${{ github.actor }}
            nuget_password=${{ secrets.GITOPS_PAT }}
          cache-from: type=gha,scope=search-develop-container
          cache-to: type=gha,mode=max,scope=search-develop-container
          provenance: mode=max
          sbom: true

      - name: Verify published digest
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE_TAG: dev-${{ steps.version.outputs.short_sha }}
        run: |
          set -euo pipefail
          [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          registry_digest="$(gcloud artifacts docker images describe "$IMAGE_NAME:$IMAGE_TAG" --format='value(image_summary.digest)')"
          test "$registry_digest" = "$IMAGE_DIGEST"

      - name: Generate build provenance attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate image SBOM evidence
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: cyclonedx
          output: trivy-sbom.cdx.json
          scanners: vuln
          exit-code: "0"

      - name: Upload image SBOM evidence
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: search-develop-sbom-${{ steps.version.outputs.short_sha }}
          path: trivy-sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Scan published digest for high-severity vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Checkout GitOps evidence repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: MALIEV-Co-Ltd/maliev-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: maliev-gitops

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f # v2

      - name: Pin disabled development overlay to digest
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cd maliev-gitops/3-apps/maliev-search-service/overlays/development
          source_image="asia-southeast1-docker.pkg.dev/maliev-website/maliev-website-artifact/maliev-search-service"
          kustomize edit set image "$source_image=$IMAGE_NAME@$IMAGE_DIGEST"
          kustomize build . >/dev/null

      - name: Create draft GitOps evidence PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          set -euo pipefail
          cd maliev-gitops
          branch_name="search-service/dev-$SHORT_SHA-${GITHUB_RUN_ATTEMPT}"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git switch -c "$branch_name"
          git add 3-apps/maliev-search-service/overlays/development/kustomization.yaml
          if git diff --staged --quiet; then
            echo "No GitOps evidence change required"
            exit 0
          fi
          git commit -m "chore(dev): record SearchService digest $IMAGE_DIGEST"
          git push origin "$branch_name"
          gh pr create \
            --draft \
            --title "[DO NOT MERGE] chore(dev): update search-service evidence" \
            --body "Evidence only: pins the disabled SearchService development overlay to $IMAGE_NAME@$IMAGE_DIGEST from source $GITHUB_SHA. Do not merge or activate any application until deployment readiness is explicitly approved." \
            --base main \
            --head "$branch_name" \
            --repo MALIEV-Co-Ltd/maliev-gitops
